# =============================================================================
# render.yaml — Render Blueprint Spec
# FPT Event Management System — Backend Deployment
# =============================================================================
#
# ⚠️  CHIẾN LƯỢC TRIỂN KHAI (đọc kỹ trước khi deploy):
#
#   Render Free Tier chỉ cho phép 1 Web Service miễn phí.
#   Vì vậy, thay vì chạy 7 microservices riêng lẻ (quá tốn tài nguyên),
#   chúng ta sẽ triển khai theo mô hình:
#
#     [Render Web Service: fpt-gateway] ← điểm vào duy nhất (port 8080)
#       └── gọi nội bộ sang các service chạy cùng process thông qua
#           goroutine + embedded HTTP mux (xem services/gateway/main.go)
#
#   Render cung cấp sẵn:
#     - 1 MySQL (hoặc PostgreSQL) free   → dùng cho database chính
#
#   ❌ Redis Add-on: Bypass credit card validation bằng cách sử dụng Local In-Memory Cache:
#       - OTP Manager: in-memory map[email]OTPRecord (sync.RWMutex)
#       - Event cache: tạm thời lưu trên process memory
#       - Không cần Redis external → không cần thẻ tín dụng
#
#   ❌ SQS (LocalStack): Render không hỗ trợ. Thay bằng:
#       ENABLE_SQS_WORKER=false → notification service gửi email trực tiếp.
#
#   ℹ️  DB_URL GENERATION:
#       Code Go sẽ tự ghép DB_URL từ các thành phần riên (DB_USER, DB_PASSWORD, 
#       DB_HOST, DB_PORT, DB_NAME) theo format chuẩn. Các biến này đã được định nghĩa
#       từ fpt-event-db database resources của Render.
#
# =============================================================================

databases:
  # ────────────────────────────────────────────────────────────────────────────
  # MySQL 8.0
  # Render cung cấp MySQL free (512 MB RAM, 1 GB storage, expire sau 90 ngày)
  # ────────────────────────────────────────────────────────────────────────────
  - name: fpt-event-db
    databaseName: fpteventmanagement
    user: fpt_app
    # plan: free   ← mặc định, Render tự nhận diện
    # region: singapore  ← chọn nếu muốn gần Việt Nam hơn

services:
  # ────────────────────────────────────────────────────────────────────────────
  # Backend — API Gateway (điểm vào duy nhất)
  #
  # CHIẾN LƯỢC FREE TIER (Bypass Credit Card Validation):
  #   - 1 Web Service: fpt-gateway (port 8080)
  #   - 1 MySQL: fpt-event-db (free, 512 MB RAM)
  #   - KHÔNG có Redis (dùng Local In-Memory Cache thay thế)
  #   - KHÔNG có SQS (gửi email trực tiếp)
  #
  # ĐÂY LÀ GIẢI PHÁP TRIỆT ĐỂ:
  #   - Không cần xác thực thẻ ngân hàng
  #   - OTP được lưu trong memory map (sync.RWMutex)
  #   - Tất cả dữ liệu cache tạm đều trên process memory
  #   - Khi app restart, cache sẽ bị clear (nhưng OTP mới sẽ được tạo)
  # ────────────────────────────────────────────────────────────────────────────
  - type: web
    name: fpt-event-gateway
    runtime: docker
    # Render sẽ build Docker image từ thư mục backend/
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    # Biến môi trường — điền giá trị thực từ Render Dashboard hoặc dùng fromDatabase
    envVars:
      # ── Database (tự động lấy từ Render Database) ──────────────────────────
      # Format DB_URL: ${DB_USER}:${DB_PASSWORD}@tcp(${DB_HOST}:${DB_PORT})/${DB_NAME}?charset=utf8mb4&parseTime=true&loc=Local&collation=utf8mb4_unicode_ci
      # Code Go sẽ tự ghép DB_URL từ các thành phần riên dưới đây
      - key: DB_HOST
        fromDatabase:
          name: fpt-event-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: fpt-event-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: fpt-event-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: fpt-event-db
          property: password
      - key: DB_NAME
        value: fpteventmanagement
      # ── Service URLs nội bộ (gateway tự gọi chính nó qua localhost) ────────
      - key: AUTH_SERVICE_URL
        value: http://localhost:8081
      - key: EVENT_SERVICE_URL
        value: http://localhost:8082
      - key: TICKET_SERVICE_URL
        value: http://localhost:8083
      - key: VENUE_SERVICE_URL
        value: http://localhost:8084
      - key: STAFF_SERVICE_URL
        value: http://localhost:8085
      - key: NOTIFICATION_SERVICE_URL
        value: http://localhost:8086
      # ── Cổng gateway ──────────────────────────────────────────────────────
      - key: LOCAL_PORT
        value: "8080"
      - key: PORT
        value: "8080"
      # ── SQS: Tắt worker vì không có SQS trên Render ───────────────────────
      - key: ENABLE_SQS_WORKER
        value: "false"
      - key: AWS_ENDPOINT_URL
        value: ""
      # ── Timezone ──────────────────────────────────────────────────────────
      - key: TZ
        value: Asia/Ho_Chi_Minh
      # ── Feature Flags (Microservices Architecture) ────────────────────────
      - key: USE_API_COMPOSITION
        value: "true"
      - key: VENUE_API_ENABLED
        value: "true"
      - key: AUTH_API_ENABLED
        value: "true"
      - key: TICKET_API_ENABLED
        value: "true"
      - key: EVENT_API_ENABLED
        value: "true"
      - key: WALLET_SERVICE_ENABLED
        value: "true"
      - key: SAGA_ENABLED
        value: "true"
      - key: NOTIFICATION_API_ENABLED
        value: "true"
      - key: SERVICE_SPECIFIC_DB
        value: "true"
      - key: SERVICE_SPECIFIC_SCHEDULER
        value: "true"
      # ── Secrets — phải điền thủ công trong Render Dashboard ───────────────
      # Truy cập: Dashboard → fpt-event-gateway → Environment → Add Env Var
      - key: JWT_SECRET
        value: ""
      - key: INTERNAL_AUTH_TOKEN
        value: ""
      - key: CORS_ALLOWED_ORIGINS
        value: ""
      - key: FRONTEND_BASE_URL
        value: ""
      # ── MoMo ──────────────────────────────────────────────────────────────
      - key: MOMO_PARTNER_CODE
        value: ""
      - key: MOMO_ACCESS_KEY
        value: ""
      - key: MOMO_SECRET_KEY
        value: ""
      # ── SMTP (AWS SES hoặc Gmail SMTP) ────────────────────────────────────
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        value: ""
      - key: SMTP_PASSWORD
        value: ""
      - key: SMTP_FROM
        value: ""
      - key: SMTP_FROM_NAME
        value: FPT Event Management
      # ── AWS S3 (vẫn dùng để lưu ảnh banner) ──────────────────────────────
      - key: AWS_REGION
        value: ap-southeast-1
      - key: AWS_ACCESS_KEY_ID
        value: ""
      - key: AWS_SECRET_ACCESS_KEY
        value: ""
      - key: AWS_S3_BUCKET
        value: ""
      # ── reCAPTCHA v2 ─────────────────────────────────────────────────────
      - key: RECAPTCHA_SECRET
        value: ""
      - key: VITE_RECAPTCHA_SITE_KEY
        value: ""
      # ── Time Machine (để trống = dùng giờ thực) ───────────────────────────
      - key: SYSTEM_TIME_OVERRIDE
        value: ""
      # ── MySQL root password (cho init script) ─────────────────────────────
      - key: MYSQL_ROOT_PASSWORD
        fromDatabase:
          name: fpt-event-db
          property: password
