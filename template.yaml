  EventFunctionArn:
    Description: Event Lambda ARN
    Value: !GetAtt EventFunction.Arn

  TicketFunctionArn:
    Description: Ticket Lambda ARN
    Value: !GetAtt TicketFunction.Arn

  VenueFunctionArn:
    Description: Venue Lambda ARN
    Value: !GetAtt VenueFunction.Arn

  StaffFunctionArn:
    Description: Staff Lambda ARN
    Value: !GetAtt StaffFunction.Arn

  NotificationFunctionArn:
    Description: Notification Lambda ARN
    Value: !GetAtt NotificationFunction.Arn
