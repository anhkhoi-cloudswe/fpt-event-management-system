  # ==========================================================
  # AUTO-SCALING - Provisioned Concurrency for critical paths
  # ==========================================================

  AuthFunctionAutoScaling:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    DependsOn: AuthFunctionAliaslive
    Properties:
      MaxCapacity: 10
      MinCapacity: 0
      ResourceId: !Sub "function:${AuthFunction}:live"
      RoleARN: !Sub "arn:aws:iam::${AWS::AccountId}:role/aws-service-role/lambda.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_LambdaConcurrency"
      ScalableDimension: lambda:function:ProvisionedConcurrency
      ServiceNamespace: lambda

  AuthFunctionAliaslive:
    Type: AWS::Lambda::Alias
    Properties:
      FunctionName: !Ref AuthFunction
      FunctionVersion: !GetAtt AuthFunction.Version
      Name: live

  AuthScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: AuthUtilizationScaling
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref AuthFunctionAutoScaling
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 0.7
        PredefinedMetricSpecification:
          PredefinedMetricType: LambdaProvisionedConcurrencyUtilization

  TicketFunctionAutoScaling:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    DependsOn: TicketFunctionAliaslive
    Properties:
      MaxCapacity: 15
      MinCapacity: 0
      ResourceId: !Sub "function:${TicketFunction}:live"
      RoleARN: !Sub "arn:aws:iam::${AWS::AccountId}:role/aws-service-role/lambda.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_LambdaConcurrency"
      ScalableDimension: lambda:function:ProvisionedConcurrency
      ServiceNamespace: lambda

  TicketFunctionAliaslive:
    Type: AWS::Lambda::Alias
    Properties:
      FunctionName: !Ref TicketFunction
      FunctionVersion: !GetAtt TicketFunction.Version
      Name: live

  TicketScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: TicketUtilizationScaling
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref TicketFunctionAutoScaling
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 0.7
        PredefinedMetricSpecification:
          PredefinedMetricType: LambdaProvisionedConcurrencyUtilization

  # ==========================================================
  # CLOUDWATCH LOG GROUPS (with retention for cost control)
  # ==========================================================

  AuthLogGroup:
