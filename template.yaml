    Export:
      Name: !Sub "${AWS::StackName}-PublicApiUrl"

  InternalApiUrl:
    Description: Internal API Gateway URL (VPC-only, for inter-service calls)
    Value: !Sub "https://${InternalApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
    Export:
      Name: !Sub "${AWS::StackName}-InternalApiUrl"

  RDSEndpoint:
    Description: RDS MySQL endpoint
    Value: !GetAtt RDSInstance.Endpoint.Address
    Export:
      Name: !Sub "${AWS::StackName}-RDSEndpoint"

  VPCId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub "${AWS::StackName}-VPCId"

  AuthFunctionArn:
    Description: Auth Lambda ARN
