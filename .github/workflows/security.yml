name: Security

on:
  pull_request:
  push:
    branches:
      - main
      - devsecops/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend-sca:
    name: Frontend SCA
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prepare report directory
        run: mkdir -p ../security-reports

      - name: Audit production dependencies
        run: |
          npm audit --omit=dev --audit-level=high > ../security-reports/npm-audit.txt 2>&1 || true

      - name: Add frontend SCA summary
        if: always()
        run: |
          {
            echo "## Frontend SCA advisory report"
            echo ""
            echo "- Mode: advisory / non-blocking"
            echo "- Text artifact: security-reports-frontend-sca"
            echo "- This scan tracks frontend production dependency vulnerabilities."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload frontend SCA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-frontend-sca
          path: security-reports/npm-audit.txt
          retention-days: 30

  backend-sca:
    name: Backend SCA
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Prepare report directory
        run: mkdir -p ../security-reports

      - name: Run govulncheck SARIF
        run: govulncheck -format=sarif ./... > ../security-reports/govulncheck.sarif || true

      - name: Ensure govulncheck SARIF exists
        if: always()
        run: |
          if [ ! -s ../security-reports/govulncheck.sarif ]; then
            cat > ../security-reports/govulncheck.sarif <<'SARIF'
          {
            "version": "2.1.0",
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "govulncheck",
                    "informationUri": "https://pkg.go.dev/golang.org/x/vuln/cmd/govulncheck",
                    "rules": []
                  }
                },
                "results": []
              }
            ]
          }
          SARIF
          fi

      - name: Run govulncheck text report
        if: always()
        run: govulncheck ./... > ../security-reports/govulncheck.txt 2>&1 || true

      - name: Upload govulncheck SARIF
        continue-on-error: true
        if: always() && hashFiles('security-reports/govulncheck.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: security-reports/govulncheck.sarif
          category: govulncheck

      - name: Add govulncheck summary
        if: always()
        run: |
          {
            echo "## govulncheck advisory report"
            echo ""
            echo "- Mode: advisory / non-blocking"
            echo "- Code scanning category: govulncheck"
            echo "- Text artifact: security-reports-govulncheck"
            echo "- This scan tracks Go dependency and standard library vulnerabilities."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload govulncheck text report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-govulncheck
          path: security-reports/govulncheck.txt
          retention-days: 30

  sast:
    name: SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep SARIF
        continue-on-error: true
        run: |
          mkdir -p security-reports
          docker run --rm -v "$PWD:/src" returntocorp/semgrep \
            semgrep scan --config p/owasp-top-ten --sarif --output /src/security-reports/semgrep.sarif /src || true

      - name: Ensure Semgrep SARIF exists
        if: always()
        run: |
          if [ ! -s security-reports/semgrep.sarif ]; then
            cat > security-reports/semgrep.sarif <<'SARIF'
          {
            "version": "2.1.0",
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "Semgrep",
                    "informationUri": "https://semgrep.dev",
                    "rules": []
                  }
                },
                "results": []
              }
            ]
          }
          SARIF
          fi

      - name: Upload Semgrep SARIF
        continue-on-error: true
        if: always() && hashFiles('security-reports/semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: security-reports/semgrep.sarif
          category: semgrep

      - name: Upload Semgrep report
        if: always() && hashFiles('security-reports/semgrep.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-semgrep
          path: security-reports/semgrep.sarif
          retention-days: 30

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec SARIF
        working-directory: backend
        continue-on-error: true
        run: |
          mkdir -p ../security-reports
          gosec -fmt=sarif -out=../security-reports/gosec.sarif ./... || true

      - name: Ensure gosec SARIF exists
        if: always()
        run: |
          if [ ! -s security-reports/gosec.sarif ]; then
            cat > security-reports/gosec.sarif <<'SARIF'
          {
            "version": "2.1.0",
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "gosec",
                    "informationUri": "https://github.com/securego/gosec",
                    "rules": []
                  }
                },
                "results": []
              }
            ]
          }
          SARIF
          fi

      - name: Upload gosec SARIF
        continue-on-error: true
        if: always() && hashFiles('security-reports/gosec.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: security-reports/gosec.sarif
          category: gosec

      - name: Upload gosec report
        if: always() && hashFiles('security-reports/gosec.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-gosec
          path: security-reports/gosec.sarif
          retention-days: 30

  container-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: docker build --target local -t "fems-backend:${IMAGE_TAG}" backend

      - name: Prepare report directory
        run: mkdir -p security-reports

      - name: Run Trivy SARIF
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: fems-backend:${{ github.sha }}
          format: sarif
          output: security-reports/trivy.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'

      - name: Ensure Trivy SARIF exists
        if: always()
        run: |
          if [ ! -s security-reports/trivy.sarif ]; then
            cat > security-reports/trivy.sarif <<'SARIF'
          {
            "version": "2.1.0",
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "Trivy",
                    "informationUri": "https://trivy.dev",
                    "rules": []
                  }
                },
                "results": []
              }
            ]
          }
          SARIF
          fi

      - name: Upload Trivy SARIF
        continue-on-error: true
        if: always() && hashFiles('security-reports/trivy.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: security-reports/trivy.sarif
          category: trivy

      - name: Upload Trivy report
        if: always() && hashFiles('security-reports/trivy.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-trivy
          path: security-reports/trivy.sarif
          retention-days: 30
