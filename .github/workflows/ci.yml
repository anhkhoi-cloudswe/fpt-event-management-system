name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - devsecops/**

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Unit tests
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts['test:unit'] ? 0 : 1)"; then
            npm run test:unit
          else
            echo "No frontend unit test script configured yet. Skipping unit tests for this workflow baseline."
            echo "## Frontend unit tests" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Status: skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "- Reason: package.json does not define test:unit yet." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build
        run: npm run build

  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Unit tests
        run: go test ./...

      - name: Build gateway
        run: go build ./cmd/gateway

      - name: Build services
        run: |
          go build ./services/auth-service
          go build ./services/authorizer-service
          go build ./services/event-service
          go build ./services/ticket-service
          go build ./services/venue-service
          go build ./services/staff-service
          go build ./services/notification-service

  docker:
    name: Backend Docker Build
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build --target local -t fems-backend:${{ github.sha }} backend
