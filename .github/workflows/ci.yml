name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Go Test And Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Download Go dependencies
        run: go mod download

      - name: Run Go tests
        env:
          JWT_SECRET: ${{ secrets.CI_JWT_SECRET || 'ci-jwt-secret-must-be-at-least-32-bytes' }}
          INTERNAL_AUTH_TOKEN: ${{ secrets.CI_INTERNAL_AUTH_TOKEN || 'ci-internal-auth-token' }}
        run: go test ./...

      - name: Build all Go packages
        env:
          JWT_SECRET: ${{ secrets.CI_JWT_SECRET || 'ci-jwt-secret-must-be-at-least-32-bytes' }}
          INTERNAL_AUTH_TOKEN: ${{ secrets.CI_INTERNAL_AUTH_TOKEN || 'ci-internal-auth-token' }}
        run: go build ./...

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
