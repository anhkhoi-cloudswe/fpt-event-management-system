name: DAST

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Deployed FEMS URL to scan, for example https://staging.example.com
        required: true
        type: string

permissions:
  contents: read

jobs:
  zap-baseline:
    name: OWASP ZAP Baseline
    runs-on: ubuntu-latest
    steps:
      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ inputs.target_url }}
          cmd_options: -a
          fail_action: false
          allow_issue_writing: false

      - name: Upload ZAP report
        if: always() && hashFiles('report_html.html') != ''
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-zap-baseline
          path: report_html.html
          retention-days: 30
