name: DAST

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Deployed FEMS URL to scan, for example https://staging.example.com
        required: true
        type: string

permissions:
  contents: read
  issues: write

jobs:
  zap-baseline:
    name: OWASP ZAP Baseline
    runs-on: ubuntu-latest
    steps:
      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ inputs.target_url }}
          cmd_options: -a
          fail_action: false
