name: Build & Deploy Frontend to S3

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build production bundle
        working-directory: ./frontend
        env:
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: frontend/dist
          retention-days: 1

  deploy:
    name: Deploy to S3
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.***REMOVED*** }}
          aws-region: ap-southeast-1

      - name: Sync to S3
        run: |
          aws s3 sync dist/ s3://fpt-event-frontend-436756555762 --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "*.css" \
            --exclude "*.js"
          aws s3 sync dist/ s3://fpt-event-frontend-436756555762 --delete \
            --cache-control "no-cache,must-revalidate" \
            --include "index.html" \
            --include "*.css" \
            --include "*.js"

      - name: Get CloudFront Distribution ID
        id: get_cloudfront_id
        run: |
          DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[0].Id" --output text)
          
          if [ "$DIST_ID" == "None" ] || [ -z "$DIST_ID" ]; then
            echo "Error: Could not find any CloudFront distribution"
            exit 1
          fi
          
          echo "DISTRIBUTION_ID=$DIST_ID" >> $GITHUB_ENV
          echo "Found CloudFront Distribution ID: $DIST_ID"

      - name: Create CloudFront invalidation
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.DISTRIBUTION_ID }} \
            --paths "/*"
