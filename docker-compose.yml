# =============================================================================
# FPT Event Management System — Docker Compose
# =============================================================================
# Orchestrates 8 containers:
#   mysql             — MySQL 8.0, initialised from Database/FPTEventManagement_v5.sql
#   auth-service      — port 8081
#   event-service     — port 8082
#   ticket-service    — port 8083
#   venue-service     — port 8084
#   staff-service     — port 8085
#   notification-service — port 8086
#   gateway           — port 8080 (reverse-proxy to all services above)
#
# Quick-start:
#   docker compose up --build        # first run — builds all images
#   docker compose up                # subsequent runs (images cached)
#   docker compose down              # stop all containers
#   docker compose down -v           # stop + wipe database volume
#
# Re-build a single service (e.g. after code change):
#   docker compose up --build auth-service
# =============================================================================

networks:
  fpt-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local

# ─── YAML anchors (DRY) ───────────────────────────────────────────────────────
x-build-defaults: &build-defaults
  context: ./backend
  dockerfile: Dockerfile
  target: local # Use the Alpine target for local dev (~25 MB images)

x-service-defaults: &service-defaults
  env_file: .env #Thay vì ./backend/.env.docker
  networks:
    - fpt-network
  restart: unless-stopped

# =============================================================================
services:

  # ──────────────────────────────────────────────────────────────────────────
  # MySQL 8.0
  # ──────────────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: fpt-mysql
    env_file: .env
    # This makes table names case-insensitive, matching the Go code which
    # queries tables like 'Event', 'Venue', 'Ticket' (mixed-case).
    # --character-set-server=utf8mb4: Enforce UTF-8MB4 at database level
    # --collation-server=utf8mb4_unicode_ci: Emoji/Vietnamese character support
    command: --lower-case-table-names=1 --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: fpteventmanagement
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "127.0.0.1:3306:3306" # expose to host so you can connect via MySQL Workbench
    volumes:
      - mysql-data:/var/lib/mysql
      # Auto-import schema & create user on first boot (runs only when data volume is empty)
      # 01_schema.sql: Creates tables and database structure
      # 02_create_user.sh: Creates MySQL application user from environment variables (NO hardcoding!)
      - ./Database/initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      # Use socket-based authentication (no password needed when connected via socket)
      # This avoids hardcoding the MYSQL_ROOT_PASSWORD in the compose file
      test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s # MySQL 8 takes ~30 s to initialise on first run
    networks:
      - fpt-network

  # ──────────────────────────────────────────────────────────────────────────
  # Auth Service
  # ──────────────────────────────────────────────────────────────────────────
  auth-service:
    build:
      <<: *build-defaults
      args:
        SERVICE: auth-lambda
        BUILD_PATH: ./services/auth-lambda
    container_name: fpt-auth
    <<: *service-defaults
    environment:
      LOCAL_PORT: "8081"
      DB_HOST: "mysql"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      INTERNAL_AUTH_TOKEN: ${INTERNAL_AUTH_TOKEN}
    depends_on:
      mysql:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────────────────────
  # Event Service
  # ──────────────────────────────────────────────────────────────────────────
  event-service:
    build:
      <<: *build-defaults
      args:
        SERVICE: event-lambda
        BUILD_PATH: ./services/event-lambda
    container_name: fpt-event
    <<: *service-defaults
    environment:
      LOCAL_PORT: "8082"
      DB_HOST: "mysql"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      INTERNAL_AUTH_TOKEN: ${INTERNAL_AUTH_TOKEN}
    depends_on:
      mysql:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────────────────────
  # Ticket Service
  # ──────────────────────────────────────────────────────────────────────────
  ticket-service:
    build:
      <<: *build-defaults
      args:
        SERVICE: ticket-lambda
        BUILD_PATH: ./services/ticket-lambda
    container_name: fpt-ticket
    <<: *service-defaults
    environment:
      LOCAL_PORT: "8083"
      DB_HOST: "mysql"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      INTERNAL_AUTH_TOKEN: ${INTERNAL_AUTH_TOKEN}
    depends_on:
      mysql:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────────────────────
  # Venue Service
  # ──────────────────────────────────────────────────────────────────────────
  venue-service:
    build:
      <<: *build-defaults
      args:
        SERVICE: venue-lambda
        BUILD_PATH: ./services/venue-lambda
    container_name: fpt-venue
    <<: *service-defaults
    environment:
      LOCAL_PORT: "8084"
      DB_HOST: "mysql"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      INTERNAL_AUTH_TOKEN: ${INTERNAL_AUTH_TOKEN}
    depends_on:
      mysql:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────────────────────
  # Staff Service
  # ──────────────────────────────────────────────────────────────────────────
  staff-service:
    build:
      <<: *build-defaults
      args:
        SERVICE: staff-lambda
        BUILD_PATH: ./services/staff-lambda
    container_name: fpt-staff
    <<: *service-defaults
    environment:
      LOCAL_PORT: "8085"
      DB_HOST: "mysql"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      INTERNAL_AUTH_TOKEN: ${INTERNAL_AUTH_TOKEN}
    depends_on:
      mysql:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────────────────────
  # Notification Service
  # ──────────────────────────────────────────────────────────────────────────
  notification-service:
    build:
      <<: *build-defaults
      args:
        SERVICE: notification-lambda
        BUILD_PATH: ./services/notification-lambda
    container_name: fpt-notification
    <<: *service-defaults
    environment:
      LOCAL_PORT: "8086"
      DB_HOST: "mysql"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      INTERNAL_AUTH_TOKEN: ${INTERNAL_AUTH_TOKEN}
      # SMTP Configuration (loaded from .env.docker)
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
    depends_on:
      mysql:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────────────────────
  # API Gateway — port 8080 (the single entry-point for the frontend)
  # ──────────────────────────────────────────────────────────────────────────
  gateway:
    build:
      <<: *build-defaults
      args:
        SERVICE: gateway
        BUILD_PATH: ./cmd/gateway
    container_name: fpt-gateway
    <<: *service-defaults
    ports:
      - "8080:8080"
    environment:
      LOCAL_PORT: "8080"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      # Override service URLs so the gateway reaches containers by name
      # (these take precedence over the values in .env.docker)
      AUTH_SERVICE_URL: "http://auth-service:8081"
      EVENT_SERVICE_URL: "http://event-service:8082"
      TICKET_SERVICE_URL: "http://ticket-service:8083"
      VENUE_SERVICE_URL: "http://venue-service:8084"
      STAFF_SERVICE_URL: "http://staff-service:8085"
      NOTIFICATION_SERVICE_URL: "http://notification-service:8086"
    depends_on:
      - auth-service
      - event-service
      - ticket-service
      - venue-service
      - staff-service
      - notification-service

  # ──────────────────────────────────────────────────────────────────────────
  # Frontend — production static assets served by Nginx
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_RECAPTCHA_SITE_KEY: ${VITE_RECAPTCHA_SITE_KEY}
    env_file: .env
    container_name: fpt-frontend
    networks:
      - fpt-network
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - gateway
